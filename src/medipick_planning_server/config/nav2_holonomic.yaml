bt_navigator_navigate_through_poses_rclcpp_node:
  ros__parameters:
    use_sim_time: false

bt_navigator_navigate_to_pose_rclcpp_node:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 8.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugin: progress_checker
    goal_checker_plugins: [general_goal_checker]
    controller_plugins: [FollowPath]
    progress_checker:
      plugin: nav2_controller::SimpleProgressChecker
      required_movement_radius: 0.03
      movement_time_allowance: 25.0
    general_goal_checker:
      plugin: nav2_controller::SimpleGoalChecker
      stateful: true
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.122173
    FollowPath:
      plugin: nav2_mppi_controller::MPPIController
      motion_model: Omni
      time_steps: 30
      model_dt: 0.1
      batch_size: 800
      iteration_count: 1
      prune_distance: 0.6
      transform_tolerance: 0.25
      temperature: 0.25
      gamma: 0.02
      vx_max: 0.06
      vx_min: -0.04
      vy_max: 0.06
      wz_max: 0.12
      ax_max: 0.05
      ay_max: 0.05
      az_max: 0.12
      vx_std: 0.06
      vy_std: 0.06
      wz_std: 0.08
      critics:
        - ConstraintCritic
        - GoalCritic
        - GoalAngleCritic
        - PathAlignCritic
        - PathFollowCritic
        - PathAngleCritic
        - PreferForwardCritic
        - CostCritic
      GoalCritic.cost_weight: 6.0
      GoalAngleCritic.cost_weight: 4.0
      PathAlignCritic.cost_weight: 10.0
      PathFollowCritic.cost_weight: 8.0
      PathAngleCritic.cost_weight: 2.0
      PreferForwardCritic.cost_weight: 0.0
      CostCritic.cost_weight: 5.0
      CostCritic.critical_cost: 300.0
      ConstraintCritic.cost_weight: 5.5

planner_server:
  ros__parameters:
    use_sim_time: false
    planner_plugins: [GridBased]
    GridBased:
      plugin: nav2_navfn_planner/NavfnPlanner
      tolerance: 0.30
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 5.0
    global_frame: world
    robot_base_frame: base_link
    transform_tolerance: 0.25
    simulate_ahead_time: 0.3
    max_rotational_vel: 0.12
    min_rotational_vel: 0.03
    rotational_acc_lim: 0.12
    behavior_plugins: [wait, drive_on_heading]
    wait:
      plugin: nav2_behaviors/Wait
    drive_on_heading:
      plugin: nav2_behaviors/DriveOnHeading

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: world
      robot_base_frame: base_link
      update_frequency: 10.0
      publish_frequency: 3.0
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[0.28, 0.22], [0.28, -0.22], [-0.28, -0.22], [-0.28, 0.22]]"
      plugins: [voxel_layer, inflation_layer]
      voxel_layer:
        plugin: nav2_costmap_2d::VoxelLayer
        enabled: true
        publish_voxel_map: false
        origin_z: -2.0
        z_resolution: 0.20
        z_voxels: 16
        max_obstacle_height: 2.20
        mark_threshold: 0
        observation_sources: pointcloud
        pointcloud:
          topic: /camera/depth/points
          max_obstacle_height: 1.80
          min_obstacle_height: 0.03
          obstacle_max_range: 2.00
          obstacle_min_range: 0.00
          raytrace_max_range: 2.20
          raytrace_min_range: 0.00
          clearing: true
          marking: true
          data_type: PointCloud2
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 4.0
        inflation_radius: 0.35

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: map
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      resolution: 0.05
      track_unknown_space: true
      footprint: "[[0.28, 0.22], [0.28, -0.22], [-0.28, -0.22], [-0.28, 0.22]]"
      plugins: [static_layer, inflation_layer]
      static_layer:
        plugin: nav2_costmap_2d::StaticLayer
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      inflation_layer:
        plugin: nav2_costmap_2d::InflationLayer
        cost_scaling_factor: 4.0
        inflation_radius: 0.35

waypoint_follower:
  ros__parameters:
    use_sim_time: false
    loop_rate: 5
    stop_on_failure: true
    waypoint_task_executor_plugin: wait_at_waypoint
    wait_at_waypoint:
      plugin: nav2_waypoint_follower::WaitAtWaypoint
      enabled: true
      waypoint_pause_duration: 1000

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 10.0
    scale_velocities: true
    feedback: OPEN_LOOP
    max_velocity: [0.06, 0.06, 0.12]
    min_velocity: [-0.04, -0.06, -0.12]
    max_accel: [0.05, 0.05, 0.12]
    max_decel: [-0.08, -0.08, -0.16]
    odom_topic: /odometry/filtered
    odom_duration: 0.2
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 0.6

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
