    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      goal_time: 20.0
      stopped_velocity_tolerance: 0.05
      base_x:
        trajectory: 0.80
        goal: 0.05
      base_y:
        trajectory: 0.80
        goal: 0.05
      base_theta:
        trajectory: 0.60
        goal: 0.08
      r1_joint:
        trajectory: 1.20
        goal: 0.08
      r2_joint:
        trajectory: 1.20
        goal: 0.08
      r3_joint:
        trajectory: 1.20
        goal: 0.08
      r4_joint:
        trajectory: 1.20
        goal: 0.08
      r5_joint:
        trajectory: 1.20
        goal: 0.08
      r6_joint:
        trajectory: 1.20
        goal: 0.08

lift_velocity_controller:
  ros__parameters:
    joints:
      - raise_joint
    interface_name: velocity

/controller_manager/lift_velocity_controller:
  ros__parameters:
    joints:
      - raise_joint
    interface_name: velocity

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: base_imu
    frame_id: base_imu_link
    static_covariance_orientation: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]
    static_covariance_angular_velocity: [0.0001, 0.0, 0.0, 0.0, 0.0001, 0.0, 0.0, 0.0, 0.0001]
    static_covariance_linear_acceleration: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]

/controller_manager/imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: base_imu
    frame_id: base_imu_link
    static_covariance_orientation: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]
    static_covariance_angular_velocity: [0.0001, 0.0, 0.0, 0.0, 0.0001, 0.0, 0.0, 0.0, 0.0001]
    static_covariance_linear_acceleration: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]

tool_controller:
  ros__parameters:
    joints:
      - sucker_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      goal_time: 3.0
      stopped_velocity_tolerance: 0.05
      sucker_joint:
        trajectory: 0.30
        goal: 0.05

/controller_manager/tool_controller:
  ros__parameters:
