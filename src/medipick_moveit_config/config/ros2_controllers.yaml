controller_manager:
  ros__parameters:
    use_sim_time: true
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    imu_sensor_broadcaster:
      type: imu_sensor_broadcaster/IMUSensorBroadcaster

gz_ros_control:
  ros__parameters:
    position_proportional_gain: 0.6

/gz_ros_control:
  ros__parameters:
    position_proportional_gain: 0.6

mobile_arm_controller:
  ros__parameters:
    joints:
      - base_x
      - base_y
      - base_theta
      - r1_joint
      - r2_joint
      - r3_joint
      - r4_joint
      - r5_joint
      - r6_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      goal_time: 20.0
      stopped_velocity_tolerance: 0.05
      base_x:
        trajectory: 0.80
        goal: 0.05
      base_y:
        trajectory: 0.80
        goal: 0.05
      base_theta:
        trajectory: 0.60
        goal: 0.08
      r1_joint:
        trajectory: 1.20
        goal: 0.08
      r2_joint:
        trajectory: 1.20
        goal: 0.08
      r3_joint:
        trajectory: 1.20
        goal: 0.08
      r4_joint:
        trajectory: 1.20
        goal: 0.08
      r5_joint:
        trajectory: 1.20
        goal: 0.08
      r6_joint:
        trajectory: 1.20
        goal: 0.08

/controller_manager/mobile_arm_controller:
  ros__parameters:
    joints:
      - base_x
      - base_y
