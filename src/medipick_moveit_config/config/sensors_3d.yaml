sensors:
  - point_cloud_sensor
point_cloud_sensor:
  sensor_plugin: occupancy_map_monitor/PointCloudOctomapUpdater
  point_cloud_topic: /medipick/mock_pointcloud
  max_range: 3.0
  point_subsample: 1
  padding_offset: 0.02
  padding_scale: 1.0
  max_update_rate: 5.0
  filtered_cloud_topic: /medipick/filtered_cloud
