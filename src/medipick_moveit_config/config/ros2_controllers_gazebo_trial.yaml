lift_velocity_controller:
  ros__parameters:
    joints:
      - raise_joint
    interface_name: velocity

/controller_manager/lift_velocity_controller:
  ros__parameters:
    joints:
      - raise_joint
    interface_name: velocity

imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: base_imu
    frame_id: base_imu_link
    static_covariance_orientation: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]
    static_covariance_angular_velocity: [0.0001, 0.0, 0.0, 0.0, 0.0001, 0.0, 0.0, 0.0, 0.0001]
    static_covariance_linear_acceleration: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]

/controller_manager/imu_sensor_broadcaster:
  ros__parameters:
    sensor_name: base_imu
    frame_id: base_imu_link
    static_covariance_orientation: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]
    static_covariance_angular_velocity: [0.0001, 0.0, 0.0, 0.0, 0.0001, 0.0, 0.0, 0.0, 0.0001]
    static_covariance_linear_acceleration: [0.0004, 0.0, 0.0, 0.0, 0.0004, 0.0, 0.0, 0.0, 0.0004]

tool_controller:
  ros__parameters:
    joints:
      - sucker_joint
    command_interfaces:
      - position
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: true
    state_publish_rate: 50.0
    action_monitor_rate: 20.0
    constraints:
      goal_time: 4.0
      stopped_velocity_tolerance: 0.02
      sucker_joint:
        trajectory: 0.30
        goal: 0.02

