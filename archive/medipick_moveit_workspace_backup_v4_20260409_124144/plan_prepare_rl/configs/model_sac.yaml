algorithm: sac

actor:
  hidden_dims: [256, 256, 256]
  activation: relu

critic:
  hidden_dims: [256, 256, 256]
  activation: relu
  twin_q: true

training:
  batch_size: 256
  replay_size: 1000000
  warmup_steps: 10000
  gamma: 0.99
  tau: 0.005
  actor_lr: 0.0003
  critic_lr: 0.0003
  alpha_lr: 0.0003
  train_every: 1
  gradient_steps: 1
